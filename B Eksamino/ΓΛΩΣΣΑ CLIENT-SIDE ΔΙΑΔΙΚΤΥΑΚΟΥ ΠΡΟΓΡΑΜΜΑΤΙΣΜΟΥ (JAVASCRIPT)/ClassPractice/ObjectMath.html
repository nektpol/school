<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Javascript Math Object</h1>
    <h2>Math Object Properties</h2>
    <p id="cbrt"></p>
    <p id="expx"></p>
    <p id="min"></p>
    <p id="max"></p>
    <p id="sqrt"></p>
    <p id="pi"></p>
    <p id="power"></p>
    <p id="round"></p>
    <p id="roundUp"></p>
    <script>
        let cbrt=Math.cbrt(27);
        document.getElementById('cbrt').innerHTML = "The cube root of 27 is: " + cbrt;
        let expx=Math.exp(2);
        document.getElementById('expx').innerHTML = "The value of e^2 is: " + expx;
    </script>
</body>
</html>
