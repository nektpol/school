<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Loop Creating List Example</title>
</head>
<body>
    <h1>For Loop Creating List</h1>
    <p id="demo"></p>

    <script>
        let text = "<ul>";
        for (let i = 1; i < 5; i++) {
            text += "<li>" + i + "</li>";
        }
        text += "</ul>";
        document.getElementById("demo").innerHTML = text;
    </script>
</body>
</html>
