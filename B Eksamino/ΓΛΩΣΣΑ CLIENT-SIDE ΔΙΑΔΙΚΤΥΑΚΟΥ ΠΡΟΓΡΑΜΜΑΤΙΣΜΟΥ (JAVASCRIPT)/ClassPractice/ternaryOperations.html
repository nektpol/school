<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ternary Operations</h1>

    <p id="demo"></p>
    <p id="demo1"></p>
    <p id="demo2"></p>

    <script>
        let isRaining = false;

        let condition = (isRaining) ? "You need a coat." : "No need for a coat.";
        document.getElementById("demo").innerHTML = condition;

        let age = 17;
        let status = age >= 18 ? "You are an adult." : "You are a minor.";
        document.getElementById("demo1").innerHTML = status;

        let score = 85;
        const message = score > 90 ? "A" : score > 75 ? "B" : score > 60 ? "C" : "F";
        document.getElementById("demo2").innerHTML = `Your grade is: ${message}`;
    </script>
</body>
</html>
