<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>τελεστής μειωσης</title>
	<style>
		*{
			box-sizing: border-box;
			margin:0;
		}
		div{
			width:320px;
			box-shadow:0 0 4px 1px #5e5e5e7e;
			text-align:center;
			margin:0 auto; /*τοποθέτηση στοιχείου στο κέντρο */
		}
		div>h1{
			background-color: #333;
			color:aliceblue;
			padding:10px;
		}
		div>h2{
			font-size:18px;
			padding:4px;

		}
		div>h2,div>p{
			margin:6px;
		}
	</style>
</head>

<body>
	<div> 
	<h1>Χρησιμοποιώντας το ++/-- 
	</h1>
	<h2>μειωση τιμής με την χρήση της μεταβλητής x</h2>
	<p id="decrement"></p>
	<h2>αυξηση τιμής με την χρήση της μεταβλητής y</h2>
	<p id="increment"></p>
	</div>
	<script>
		let x=6;
        x--;
		let y=6;
        y++;

		/*η νέα τιμή θα είναι 6-1=5 */
		document.getElementById("decrement").innerHTML=x;
        		
	/*η νέα τιμή θα είναι 6+1=7 */
		document.getElementById("increment").innerHTML=y;
	</script>
</body>
</html>
