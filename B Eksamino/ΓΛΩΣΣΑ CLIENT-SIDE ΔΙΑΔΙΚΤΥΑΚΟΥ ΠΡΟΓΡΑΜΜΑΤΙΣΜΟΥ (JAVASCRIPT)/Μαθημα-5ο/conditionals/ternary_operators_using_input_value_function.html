<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Η δήλωση switch</title>
</head>
<body>
	<h1>Ternary operators-Τριμερής Τελεστές </h1>
	<p>Ένας άλλος τρόπος για να γράψετε όρους κατα συνθηκη-conditionals είναι η χρήση τριμερών τελεστών.Ο τελεστής υπό συνθήκη εκχωρεί μια τιμή σε μια μεταβλητή με βάση μια συνθήκη.</p>


    <p>Input your age and click the button:</p>
    <input id="age" value="18">
    <button onclick="myFunction()">Try it</button>
    <p id="demo"></p>
	<script>
        function myFunction(){
            //variable age gets the value of the user using the property value placed after method document.getElementById
            let age = document.getElementById("age").value;
            let text =(age<18)?"too young":"you are adult!you have the right";//ternary operator to form conditionals
            document.getElementById("demo").innerHTML=text +" to vote.";

        }
  

	</script>
</body>
</html>
