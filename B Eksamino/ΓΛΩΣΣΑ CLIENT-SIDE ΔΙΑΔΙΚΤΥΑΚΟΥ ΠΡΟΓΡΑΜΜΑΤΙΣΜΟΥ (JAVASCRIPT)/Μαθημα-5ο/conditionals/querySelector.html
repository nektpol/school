<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Η δήλωση if else</title>
<style>
	#demo{
		color:#154406;
		border-left:4px solid green;
	}
	#raining{

	}
	.demo{

	}
	a{

	}
</style>
</head>
<body>
	<h1>Η μέθοδος querySelector</h1>
	<p class="demo">text 1</p>
	<p class="demo">text 2</p>
	<p class="demo">text 3</p>
	<p id="raining">raining</p>

	<a href="#">link1</a>
	<a href="#">link2</a>
	<a href="#">link3</a>
	<script>
		//επιλογή στοιχείου με την χρήση κλάσης demo 
		let el=document.querySelector(".demo");
		el.style="color:blue;";
		//επιλογή στοιχείου με την χρήση γενικού επιλογέα
		let el2= document.querySelector("a");
		el2.style="text-decoration:none; color:purple;"

		let el3 = document.querySelector("#raining");
		el3.style="color:red;"
	</script>
</body>
</html>
