<!DOCTYPE html>
<html>
	<head>
		<title>αποκρυψη/εμφάνιση στοιχείων css στην Javascript</title>
		<meta name="keywords" content="εισαγωγή στην Javascript,JavaScript"/>
		<meta charset="UTF-8">
		<style>

		</style>
	</head>
	<body>
	<h1>τι μπορεί να κάνει η Javascript</h1>
	<h2>Αποκρυψη και εμφάνιση στοιχείων</h2>
	
	<p id="demo">Η JavaScript μπορεί να αποκρύψει το στυλ css ενος html στοιχείου με την χρήση του χαρακτηριστικού style.</p>
	<input type="submit" onclick="document.getElementById('demo').style.visibility='hidden'" value="Κρύψε">
	<input type="submit" onclick="document.getElementById('demo').style.visibility='visible'" value="Εμφάνισε">
	</body>
</html>
