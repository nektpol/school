	<body>
			<h1>innerHTML</h1>
			<h1></h1>
			<p id="demo"></p>
			
		<script>
		document.getElementById("demo").innerHTML = "Hello there"; //statement
		//document=> στο παρόν εγγραφο της html innnerhtml.html (αντικείμενο)

		//innerHTML => προσθέτει περιεχόμενο ανάμεσα στο στοιχείο της παραγράφου (ιδιότητα του αντικειμένου document)
		</script>
			
	</body>

</html>
