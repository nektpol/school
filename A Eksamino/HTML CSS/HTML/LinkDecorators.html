<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul.list{
            list-style: none;
        }

        ul.list>li{
            display: inline-block;
        }

        ul.list a{
            text-decoration: none;
            display: block;
        }

        ul.list a:link{
            color:blue;
        }

        ul.list a:hover{
            color:red;
        }

        ul.list a:active{
            color:black;
        }

        ul.list a:visited{
            color:green;
        }
    </style>
</head>
<body>
    <ul class="list">
        <li><a href="https://www.google.com/">Google</a></li>
        <li><a href="https://www.google.com/">Bing</a></li>
        <li><a href="https://www.google.com/">Yahoo</a></li>
    </ul>
    
</body>
</html>
