<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        *{
            box-sizing: border-box;
        }
        a{
            display: inline-block;
            text-decoration: none;
            background-color: #333;

            padding: 16px 20px;

            border: 1px solid #333;

<body>

    <a href="#">About</a>

</html>
