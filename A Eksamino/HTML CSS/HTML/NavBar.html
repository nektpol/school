<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavBar</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        div{
            background-color: #333;
        }
        div > ul{
            list-style: none;
            width: 50%;
            margin: 0 0 0 auto;
        }
        div li{
            display: inline-block;

        }
        div li > a{
            text-decoration: none;
            color: white;
            padding: 14px 16px;
            display: inline-block;
            text-align: center;
            font-family: Geneva, Verdana, Tahoma, sans-serif;
        }
        div li > a:hover{
            background-color: #111;
        }
    </style>
</head>
<body>
    <div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</body>
</html>
