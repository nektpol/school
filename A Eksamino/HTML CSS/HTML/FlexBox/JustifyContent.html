<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        div.flex-container1{
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: space-between;
            background-color: blueviolet;
            width: 600px;
            margin: 10px;
        }

        div.flex-container1>div{
            background-color: #f1f1f1;
            padding: 20px;
            margin: 4px;
            width: 120px;
        }
    </style>
</head>
<body>
    <h1>Orizontia stixisi flex stixoiwn me tin idiotita justify-content</h1>
    <h2>justify-content:flex-start-stoixish sta aristera tou periekti</h2>
    <div class="flex-container1">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
