<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position:absolute</title>
    <style>
        .relative{
            width: 100px;
            padding: 50px;
            position: relative;
            bottom: 50px;
            right: 80px;
            top: 60px;
            left: 60px;
            border: 3px solid red;
        }
        .absolute{
            width: 20%;
            padding: 25px;
            top: 170px;
            left: 200px;
            position: absolute;
            border: 3px solid red;
        }
    </style>
</head>
<body>
    <h2>Position: absolute</h2>
    <p></p>
    <div class="relative">
        <div class="absolute">
            Αυτό το στοιχείο div έχει position: absolute σε σχέση πάντα με το γονιό που πρέπει να έχει relative
        </div>
        
    </div>
</body>
</html>
