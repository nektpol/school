<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        }

</head>
<body>
    <ol>
        <li>Mathmatika</li>

        <li>Mathmatika</li>
        <li>Istoria</li>
        <li>Fisiki</li>
        <li>Xhmeia</li>
    </ol>

    <ol id="latin">
        <li>Mathmatika</li>
        <li>Istoria</li>
        <li>Fisiki</li>
        <li>Xhmeia</li>
    </ol>

    <ol id="none">
        <li>Mathmatika</li>
        <li>Istoria</li>
        <li>Fisiki</li>
        <li>Xhmeia</li>
    </ol>

    <ol id="roman">
        <li>Mathmatika</li>
        <li>Istoria</li>
        <li>Fisiki</li>
        <li>Xhmeia</li>
    </ol>
</body>
</html>
